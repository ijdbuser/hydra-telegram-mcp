name: Docker Build & Compose Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker:
    name: Build
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE_NAME: ${{ github.event.repository.name }}
      DOCKER_IMAGE_TAG: ${{ github.sha }}
      TELEGRAM_API_ID: ${{ vars.TELEGRAM_API_ID || 'DUMMY_ID' }}
      TELEGRAM_API_HASH: ${{ vars.TELEGRAM_API_HASH || 'DUMMY_HASH' }}
      TELEGRAM_SESSION_STRING: ${{ vars.TELEGRAM_SESSION_STRING || 'DUMMY_SESSION' }}
      MCP_SECURITY_TOKEN: ${{ vars.MCP_SECURITY_TOKEN || '' }}
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}" .

      - name: Validate Compose file
        run: docker compose config

      - name: Build Compose services
        run: docker compose build
