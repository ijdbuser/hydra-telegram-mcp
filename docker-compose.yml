services:
  telegram-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?TELEGRAM_API_ID is required}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?TELEGRAM_API_HASH is required}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:?TELEGRAM_SESSION_STRING is required}
      FASTMCP_HOST: ${FASTMCP_HOST:-0.0.0.0}
      FASTMCP_PORT: ${FASTMCP_PORT:-8000}
    # Keep stdin open and allocate a pseudo-TTY for interactive local runs.
    stdin_open: true
    tty: true
    # Optional: Uncomment the following lines to mount a local directory
    # for persisting the Telegram session file if NOT using TELEGRAM_SESSION_STRING.
    # Replace './telegram_sessions' with your desired host path.
    # volumes:
    #   - ./telegram_sessions:/app
    restart: unless-stopped
